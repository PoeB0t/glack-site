<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo site</title>

  <style>
    body {
      margin: 0;
      font-family: "MS Sans Serif", Tahoma, Arial, sans-serif;
      background: #008080;
      color: #111;
    }

    .desktop {
      min-height: 100vh;
      padding: 28px;
      background:
        linear-gradient(rgba(255,255,255,0.04), rgba(0,0,0,0.08)),
        #008080;
    }

    .icon {
      width: 90px;
      text-align: center;
      color: white;
      text-shadow: 1px 1px 1px black;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .icon-box {
      width: 42px;
      height: 42px;
      margin: 0 auto 6px;
      background: #f1c232;
      border: 2px solid #000;
      box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2);
    }

    .window {
      width: min(560px, 90%);
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #404040;
      border-bottom: 2px solid #404040;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.25);
    }

    .title {
      background: linear-gradient(90deg, #000080, #1084d0);
      color: white;
      padding: 5px 8px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }

    .content {
      padding: 18px;
      line-height: 1.5;
    }

    .content h1 {
      margin-top: 0;
      font-size: 26px;
    }

    .button {
      display: inline-block;
      padding: 7px 14px;
      background: #c0c0c0;
      color: #111;
      text-decoration: none;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #404040;
      border-bottom: 2px solid #404040;
    }

    .taskbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 34px;
      background: #c0c0c0;
      border-top: 2px solid #fff;
      display: flex;
      align-items: center;
      padding: 3px;
    }

    .start {
      padding: 4px 12px;
      font-weight: bold;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #404040;
      border-bottom: 2px solid #404040;
    }
  </style>
</head>
<body>

  <div class="desktop">
    <div class="icon">
      <div class="icon-box"></div>
      My Computer
    </div>

    <div class="window">
      <div class="title">
        <span>Мой сайт</span>
        <span>_ □ ×</span>
      </div>

      <div class="content">
        <h1>Привет из старого ПК</h1>
        <p>
          Это демо-страница внутри старого монитора. 
          Её можно заменить на любой другой сайт или свою HTML-страницу.
        </p>

        <a class="button" href="#">Кнопка</a>
      </div>
    </div>
  </div>

  <div class="taskbar">
    <div class="start">Пуск</div>
  </div>

</body>
</html>
